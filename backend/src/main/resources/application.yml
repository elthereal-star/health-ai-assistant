server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: health-ai-assistant
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/health_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  redis:
    host: localhost
    port: 6379
    database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

ai:
  provider: deepseek
  api-key: ${AI_API_KEY:}
  base-url: ${AI_API_BASE_URL:https://api.deepseek.com}
  model: ${AI_MODEL:deepseek-chat}
  timeout-seconds: 30
  enabled: ${AI_ENABLED:true}

logging:
  level:
    com.health.ai: debug
